services:
  - type: web
    name: agrisahayak-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false  # Set in Render dashboard
      - key: JWT_SECRET
        sync: false  # Set in Render dashboard
      - key: EMAIL_USER
        sync: false  # Set in Render dashboard
      - key: EMAIL_PASS
        sync: false  # Set in Render dashboard
      - key: CORS_ORIGIN
        value: https://se32frontend.vercel.app